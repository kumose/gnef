syntax = "proto3";

package kumo.nlp;


message NerSetting {
  string pattern    = 1;
  string model      = 2;
  bool   use_cache  = 3;
  string strategy   = 4;
}

message NerTaxonomyInfo {
  string node_id = 1;
  string node_name = 2;
};

message NerTypeInfo {
  string type = 1;
  float confidence = 2;
  string debug = 3;
  repeated NerTaxonomyInfo taxonomy_info = 4;
};

message NerInfo {
  string entity_name = 1;
  int32 start_pos = 2;
  int32 end_pos = 3;
  string source = 4;
  repeated NerTypeInfo entity_types = 5;
};

message NerRequest {
  string query = 1;
  NerSetting setting = 2;
}

message NerResponse {
  repeated NerInfo entities = 1;
};
