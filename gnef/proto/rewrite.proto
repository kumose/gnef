syntax = "proto3";

package kumo.nlp;

import "gnef/proto/segment.proto";

message RewriteSetting {
  bool enable_synonym =1;
  bool enable_correct = 2;
}

message RewriteQueryInfo {
    double belief = 1;
    int32 level = 2;
    TermInfo origin = 3;
    TermInfo rewrite_term = 4;
    bool is_recall = 5;
    string extra_json = 6;
    string debug_info = 7;
}