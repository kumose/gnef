syntax = "proto3";

package kumo.nlp;

import "gnef/proto/normalize.proto";
import "gnef/proto/segment.proto";
import "gnef/proto/ner.proto";
import "gnef/proto/embdding.proto";
import "gnef/proto/ngram.proto";
import "gnef/proto/semantic.proto";
import "gnef/proto/rewrite.proto";

message NlpSetting {
    string name = 1;
    NormalizeSetting normalize_setting = 2;
    SegmentSetting   segment_setting = 3;
    NerSetting        ner_setting = 4;
    EmbeddingSetting  embedding_setting = 5;
    NgramSetting      ngram_setting = 6;
    RewriteSetting     rewrite = 7;
}

message NlpRequest {
    string query = 1;
    NlpSetting setting = 2;
}

message NlpResult {
    string raw_query = 1;
    /// normalized query
    string lang = 2;
    string query = 3;
    string pinyin = 4;
    string pinyin_short = 5;
    SegmentResult  terms = 6;
    repeated NerInfo entities = 7;
    repeated float feature = 8;
    repeated NgramInfo ngram = 9;
    repeated TokenInfo tokens = 10;
    repeated RewriteQueryInfo   rewrite = 11;
}