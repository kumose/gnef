syntax = "proto3";

package kumo.nlp;


message DetectConfig {
  string unknown = 1;
  float threshold = 2;
  string model = 3;
  string prefix = 4;
}

message DictConfig {
  string xpinyin_dict = 1;
  string fasttext_dict = 2;
  string jieba_dict = 3;
  string hadar_dict = 4;
};

message KvConfig {
  string key = 1;
  string value = 2;
}
message Config {
    DetectConfig detect = 1;
    DictConfig dict = 2;
    repeated KvConfig kv = 3;
}