syntax = "proto3";

package kumo.nlp;

message SegmentSetting {
  bool enable_pos = 1;
  /// enable phrase
  bool phrase     = 2;
};

/// this is used by search and offline,
/// for proto compatible,
/// Defined here for reusability across different business modules.
message TermBasicWeight {
  /// one word
  string term = 1;
  /// query -> title
  double qt_weight = 2;
  /// title -> query
  double tq_weight = 3;
  /// query -> title
  double qt_tight = 4;
  /// title -> query
  double tq_tight = 5;
};

message TermInfo {
  /// word or phrase
  string term = 1;

  /// noun/verb/adv etc.
  string pos = 2;
  /// position
  int32 offset = 3;
  int32 length = 4;
  double idf = 5;
  /// for multi language
  int32 char_offset = 6;
  int32 char_length = 7;
};

/// most simple, we always using the main term, but when we conside to searching,
/// we need more infos about this term, rewrite or something, so we put an additional
/// for user to implement it own algorithm field to fill them meaning.
message SegmentTerm {
  TermInfo main_term = 1;
  repeated TermInfo term_infos = 2;
};

message SegmentResult {
    repeated SegmentTerm terms = 1;
    repeated TermBasicWeight weights = 2;
}

message SegmentRequest {
    string query = 1;
    SegmentSetting setting = 2;
}

message SegmentResponse {
    SegmentResult result = 1;
}